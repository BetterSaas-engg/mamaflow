# PR/main CI: backend tests, frontend analyze+test, firewall guard.
# The guard job makes scripts/firewall-guard.sh un-bypassable server-side —
# local git hooks only protect machines that installed them.
# Python 3.14 + en_core_web_lg mirror the Railway image (backend/Dockerfile).
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_lg
      - name: Run tests
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  firewall:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Firewall guard (all tracked files)
        run: bash scripts/firewall-guard.sh
